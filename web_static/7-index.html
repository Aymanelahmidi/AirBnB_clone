<!DOCTYPE html>
<html lang="en">
<head>
     <title>AirBnB clone</title>
     <link rel="stylesheet" href="styles/4-common.css">
     <link rel="stylesheet" href="styles/4-filters.css">
     <link rel="stylesheet" href="styles/3-footer.css">
     <link rel="stylesheet" href="styles/3-header.css">
     <link rel="stylesheet" href="styles/5-filters.css">
     <link rel="stylesheet" href="styles/6-filters.css">
     <link rel="stylesheet" href="styles/7-places.css">
     <link rel="shortcut icon" href="images/icon.png" type="image/x-icon">
</head>
<body>
    <!-- The header start here -->
    <header >
        <a href="#"></a>
    </header>
    <!-- header ends here-->


    <!-- Container start here-->
    <div class="container">
        <!--filter section start here-->
        <section class="filters">
            <div class="locations">
                <h3>States</h3>
                <h4>Kano, Lagos, Abuja ...</h4>
                <ul class="popover">
                    <li><h2>Lagos</h2></li>
                    <li>Alimosho</li>
                    <li>Mushin</li>

                    <li><h2>Kano</h2></li>
                    <li>Badawa</li>
                    <li>Kawo</li>
                </ul>
            </div>
            <div class="amenities">
                <h3>Amenities</h3>
                <h4>Clean Water, Power Supply</h4>
                <ul class="popover">
                    <h2></h2>
                    <li>Internet</li>
                    <li>TV</li>
                    <li>Kitchen</li>
                    <li>Iron</li>
                </ul>
            </div>
            <button>Search</button>
        </section>
        <!--filter section ends here-->
        <!--Result section -->
        <section class="places">
            <h1 id="title">
                Places
            </h1>

            <article>
                <h2>My Home</h2>
            </article>
            <article>
                <h2>Tiny house</h2>
            </article>
            <article>
                <h2>A suite</h2>
            </article>
        </section>
        <!-- Result section ends here-->
    </div>
    <!-- Container ends here-->
    <footer>
        Best School
    </footer>
</body>
</html>
